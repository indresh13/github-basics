<!DOCTYPE html>
<html>

<head>
    <title>Login Form</title>
    <style>
        body {
            background-color: #eef2f3;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 80px;
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .extra {
            text-align: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .extra a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>

<body>
    <h1>Every thing is fair in love and war #T</h1>
    <h1>Pyar mohabbat dosti yari vet mulakat</h1>

    <div class="login-box">
        <h2>Login</h2>
        <form>
            <label>Email</label>
            <input type="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="extra">
            <p><a href="#">Forgot Password?</a></p>
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>
    </div>

</body>

</html>
